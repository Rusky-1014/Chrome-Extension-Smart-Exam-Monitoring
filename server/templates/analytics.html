<!DOCTYPE html>
<html>

<head>
    <title>Analytics</title>
</head>

<body>

    <h2>Violation Analytics</h2>

    <table border="1" cellpadding="10">
        <tr>
            <th>Category</th>
            <th>Count</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>
    <a href="/">Back to Dashboard</a>

</body>

</html>
